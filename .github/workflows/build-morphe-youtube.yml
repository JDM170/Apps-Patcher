name: Build Morphe YouTube

on:
  workflow_call:
    outputs:
      cli:
        description: "Morphe CLI version"
        value: ${{ jobs.youtube_morphe.outputs.cli }}
      patches:
        description: "Morphe Patches version"
        value: ${{ jobs.youtube_morphe.outputs.patches }}
      youtube_microg:
        description: "MicroG version"
        value: ${{ jobs.youtube_morphe.outputs.youtube_microg }}
      youtube_app:
        description: "Supported YouTube version"
        value: ${{ jobs.youtube_morphe.outputs.youtube_app }}
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  youtube_morphe:
    runs-on: windows-latest
    timeout-minutes: 10
    outputs:
      cli: ${{ steps.morphe_cli.outputs.CLIvtag }}
      patches: ${{ steps.morphe_patches.outputs.Patchesvtag }}
      youtube_microg: ${{ steps.youtube_microg.outputs.MicroGTag }}
      youtube_app: ${{ steps.youtube_app.outputs.SupportedYoutube }}
    steps:
      - uses: actions/checkout@v6

      - name: Download and expand Zulu JDK
        env:
          ZuluJDKDir: "Morphe"
        run: |
          New-Item -Path Morphe -ItemType Directory -Force
          . Scripts\Zulu_JDK.ps1

      - name: Download Morphe CLI
        id: morphe_cli
        run: . Scripts\Morphe\CLI.ps1

      - name: Download Morphe Patches
        id: morphe_patches
        run: . Scripts\Morphe\Patches.ps1

      - name: Download Morphe MicroG
        id: youtube_microg
        run: . Scripts\Morphe\MicroG.ps1

      - name: Download YouTube App
        id: youtube_app
        run: . Scripts\Morphe\YouTube.ps1

      - name: Add keystore from secrets
        env:
          KEYSTORE: ${{ secrets.MORPHE_KEYSTORE }}
        if: ${{ env.KEYSTORE != '' }}
        run: |
          New-Item -Path "Morphe\morphe-data" -ItemType Directory -Force
          [byte[]]$bytes = [convert]::FromBase64String('${{ env.KEYSTORE }}')
          [System.IO.File]::WriteAllBytes("Morphe\morphe-data\morphe.keystore", $bytes)

      - name: Build patched APK
        run: |
          $JavaPath = (Resolve-Path -Path "Morphe\jdk_windows-x64_bin\zulu*win_x64\bin\java.exe").Path
          & $JavaPath `
          -jar "Morphe\morphe-cli.jar" patch `
          --patches "Morphe\morphe-patches.mpp" `
          --disable "Alternative thumbnails" `
          --disable "Custom branding" `
          --disable "Change header" `
          --disable "Shorts autoplay" `
          --disable "Theme" `
          --purge `
          --out "Morphe\youtube-morphe.apk" `
          "Morphe\youtube.apk"

      - name: Create archive
        run: |
          $Parameters = @{
              Path             = "Morphe\youtube-morphe.apk", "Morphe\microg.apk"
              DestinationPath  = "Youtube-Morphe.zip"
              CompressionLevel = "Fastest"
              Force            = $true
          }
          Compress-Archive @Parameters

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: YouTube-Morphe
          path: Youtube-Morphe.zip
          retention-days: 1
