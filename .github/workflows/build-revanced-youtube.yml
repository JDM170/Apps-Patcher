name: Build ReVanced YouTube

on:
  workflow_call:
    outputs:
      zulu:
        description: "Zulu JDK version"
        value: ${{ jobs.youtube_revanced.outputs.zulu }}
      cli:
        description: "ReVanced CLI version"
        value: ${{ jobs.youtube_revanced.outputs.cli }}
      patches:
        description: "ReVanced Patches version"
        value: ${{ jobs.youtube_revanced.outputs.patches }}
      youtube_microg:
        description: "MicroG version"
        value: ${{ jobs.youtube_revanced.outputs.youtube_microg }}
      youtube_app:
        description: "Supported YouTube version"
        value: ${{ jobs.youtube_revanced.outputs.youtube_app }}
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  youtube_revanced:
    runs-on: windows-latest
    timeout-minutes: 10
    outputs:
      zulu: ${{ steps.zulu.outputs.ZuluTag }}
      cli: ${{ steps.revanced_cli.outputs.CLIvtag }}
      patches: ${{ steps.revanced_patches.outputs.Patchesvtag }}
      youtube_microg: ${{ steps.youtube_microg.outputs.MicroGTag }}
      youtube_app: ${{ steps.youtube_app.outputs.SupportedYoutube }}
    steps:
      - uses: actions/checkout@v6

      - name: Download and expand Zulu JDK
        id: zulu
        env:
          ZuluJDKDir: "ReVanced"
        run: |
          New-Item -Path ReVanced -ItemType Directory -Force
          . Scripts\Zulu_JDK.ps1

      - name: Download ReVanced CLI
        id: revanced_cli
        run: . Scripts\ReVanced\CLI.ps1

      - name: Download ReVanced Patches
        id: revanced_patches
        run: . Scripts\ReVanced\Patches.ps1

      - name: Download Vanced MicroG
        id: youtube_microg
        run: . Scripts\ReVanced\MicroG.ps1

      - name: Download YouTube App
        id: youtube_app
        run: . Scripts\ReVanced\YouTube.ps1

      - name: Add keystore from secrets
        env:
          KEYSTORE: ${{ secrets.REVANCED_KEYSTORE }}
        if: ${{ env.KEYSTORE != '' }}
        run: |
          [byte[]]$bytes = [convert]::FromBase64String('${{ env.KEYSTORE }}')
          [System.IO.File]::WriteAllBytes("ReVanced\youtube-revanced.keystore", $bytes)

      - name: Build patched APK
        run: |
          $JavaPath = (Resolve-Path -Path "ReVanced\jdk_windows-x64_bin\zulu*win_x64\bin\java.exe").Path
          & $JavaPath `
          -jar "ReVanced\revanced-cli.jar" patch `
          --patches "ReVanced\revanced-patches.rvp" `
          --disable "Always repeat" `
          --disable "Disable auto captions" `
          --disable "Hide timestamp" `
          --disable "Hide seekbar" `
          --purge `
          --out "ReVanced\youtube-revanced.apk" `
          -b `
          "ReVanced\youtube.apk"

      - name: Create archive
        run: |
          $Parameters = @{
              Path             = "ReVanced\youtube-revanced.apk", "ReVanced\microg.apk", "ReVanced\microg-hw.apk"
              DestinationPath  = "Youtube-ReVanced.zip"
              CompressionLevel = "Fastest"
              Force            = $true
          }
          Compress-Archive @Parameters

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: YouTube-ReVanced
          path: Youtube-ReVanced.zip
          retention-days: 1
